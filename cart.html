<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Korpa — Zlatara Unca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Public+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#main">Pređi na sadržaj</a>

<header class="site-header">
  <div class="bar">
    <a class="brand" href="index.html">
      <span class="punca"><span>U<span class="k">·N·C·A</span></span></span>
      <span>Zlatara Unca<small>Zlato · Srebro · Od 1998</small></span>
    </a>
    <nav class="primary" aria-label="Glavna navigacija">
      <a href="index.html">Početna</a>
      <a href="shop.html">Shop</a>
      <a href="o-nama.html">O nama</a>
      <a href="kontakt.html">Kontakt</a>
    </nav>
    <div class="header-actions">
      <a class="cart-pill" href="cart.html" aria-current="page">
        <span>Korpa</span>
        <span class="count" data-cart-count>0</span>
      </a>
      <button class="nav-toggle" aria-label="Otvori meni">☰</button>
    </div>
  </div>
</header>

<div class="mobile-drawer">
  <div class="drawer-top">
    <span class="brand"><span class="punca"><span>U</span></span></span>
    <button class="close-btn" aria-label="Zatvori meni">✕</button>
  </div>
  <nav>
    <a href="index.html">Početna</a>
    <a href="shop.html">Shop</a>
    <a href="o-nama.html">O nama</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="cart.html">Korpa (<span data-cart-count>0</span>)</a>
  </nav>
</div>

<main id="main">
  <div class="page-header">
    <div class="wrap">
      <div class="breadcrumb"><a href="index.html">Početna</a> / Korpa</div>
      <h1>Vaša korpa</h1>
    </div>
  </div>

  <div class="wrap" id="cart-root"></div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 Zlatara Unca. Sva prava zadržana.</span>
      <span>Redizajn koncept — demo verzija</span>
    </div>
  </div>
</footer>

<script src="data.js"></script>
<script src="icons.js"></script>
<script src="cart.js"></script>
<script src="main.js"></script>
<script>
  const root = document.getElementById("cart-root");

  function renderCart() {
    const lines = readCart();

    if (lines.length === 0) {
      root.innerHTML = `
        <div class="empty-cart">
          <span class="punca"><span>0</span></span>
          <h2>Korpa je prazna</h2>
          <p>Dodajte komad iz kataloga da nastavite.</p>
          <a class="btn primary" href="shop.html">Pogledaj shop</a>
        </div>`;
      return;
    }

    const rows = lines.map((line) => {
      const p = getProductById(line.id);
      if (!p) return "";
      return `
        <div class="cart-line" data-line="${p.id}">
          <div class="thumb">${iconFor(p.icon)}</div>
          <div>
            <div class="cat">${p.cat}</div>
            <div class="name">${p.name}</div>
            <div class="qty-control" style="margin-top:8px;">
              <button type="button" data-dec="${p.id}" aria-label="Smanji količinu">−</button>
              <input type="text" value="${line.qty}" readonly aria-label="Količina">
              <button type="button" data-inc="${p.id}" aria-label="Povećaj količinu">+</button>
            </div>
          </div>
          <div class="price">${formatRSD(p.price * line.qty)}</div>
          <button class="remove" data-remove="${p.id}">Ukloni</button>
        </div>`;
    }).join("");

    const subtotal = cartTotal();
    const shipping = subtotal >= 10000 ? 0 : 350;
    const total = subtotal + shipping;

    root.innerHTML = `
      <div class="cart-layout">
        <div class="cart-lines">${rows}</div>
        <div class="cart-summary">
          <h3>Pregled porudžbine</h3>
          <div class="summary-row"><span>Međuzbir</span><span>${formatRSD(subtotal)}</span></div>
          <div class="summary-row"><span>Dostava</span><span>${shipping === 0 ? "Besplatno" : formatRSD(shipping)}</span></div>
          <div class="summary-row total"><span>Ukupno</span><span class="val">${formatRSD(total)}</span></div>
          <button class="btn primary block" id="checkout-btn">Nastavi na plaćanje</button>
          <p style="font-family:var(--mono);font-size:0.7rem;color:var(--parchment-dim);margin-top:14px;">
            Demo verzija — plaćanje i slanje porudžbine se povezuju u koraku pre lansiranja.
          </p>
        </div>
      </div>
    `;

    root.querySelectorAll("[data-inc]").forEach((b) =>
      b.addEventListener("click", () => {
        const line = readCart().find((l) => l.id === b.dataset.inc);
        if (line) { setQty(line.id, line.qty + 1); renderCart(); }
      })
    );
    root.querySelectorAll("[data-dec]").forEach((b) =>
      b.addEventListener("click", () => {
        const line = readCart().find((l) => l.id === b.dataset.dec);
        if (line) { setQty(line.id, line.qty - 1); renderCart(); }
      })
    );
    root.querySelectorAll("[data-remove]").forEach((b) =>
      b.addEventListener("click", () => { removeFromCart(b.dataset.remove); renderCart(); })
    );
    const checkoutBtn = document.getElementById("checkout-btn");
    if (checkoutBtn) {
      checkoutBtn.addEventListener("click", () => {
        alert("Ovo je demo za pitch prezentaciju — pravo plaćanje se dodaje u finalnoj Webflow verziji.");
      });
    }
  }

  renderCart();
</script>
</body>
</html>
